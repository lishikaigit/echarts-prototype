name: Deploy ECharts Prototype to GitHub Pages

on:
  push:
    branches: [ main ]  # 当main分支有推送时触发
  workflow_dispatch:    # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install -g gh-pages

      - name: Deploy to GitHub Pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # GitHub自动提供的令牌
          # 如果需要使用自定义令牌，可以替换为：
          # GITHUB_TOKEN: ${{ secrets.MY_CUSTOM_TOKEN }}
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          gh-pages -d . -f -r https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
